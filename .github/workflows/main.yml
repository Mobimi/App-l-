name: Build PerformanceHUD IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          # Cài đặt công cụ đóng gói và ký file
          brew install ldid dpkg

      - name: Install Theos
        run: |
          export THEOS=/Users/runner/work/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # Tải SDK
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/archive/master.zip -o sdks.zip
          unzip -q sdks.zip
          mv sdks-master/*.sdk $THEOS/sdks/
          
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Build Package
        run: |
          export THEOS=$THEOS
          
          # FIX LỖI PATH: Thêm cả đường dẫn Homebrew của Intel và Apple Silicon
          export PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$THEOS/bin"
          
          # Ép ldid phải được tìm thấy
          which ldid || echo "ldid không tìm thấy, kiểm tra lại brew"
          
          make package FINALPACKAGE=1
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PerformanceHUD-IPA
          path: packages/*.ipa
