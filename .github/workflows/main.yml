name: Build PerformanceHUD IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          # Cài đặt ldid và dpkg - hai món nợ đời của dân build Theos
          brew install ldid dpkg

      - name: Install Theos
        run: |
          # 1. Cài đặt môi trường Theos
          export THEOS=/Users/runner/work/theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          
          # 2. Tải toàn bộ kho SDK chuẩn từ Theos
          mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/archive/master.zip -o sdks.zip
          unzip -q sdks.zip
          
          # 3. Chuyển các file SDK vào đúng vị trí
          mv sdks-master/*.sdk $THEOS/sdks/
          
          # 4. Lưu biến môi trường
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Build Package
        run: |
          export THEOS=$THEOS
          # Thêm dòng này để chắc chắn ldid nằm trong PATH
          export PATH="/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin:$THEOS/bin"
          
          make package FINALPACKAGE=1
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PerformanceHUD-IPA
          path: packages/*.ipa
